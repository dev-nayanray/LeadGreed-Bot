name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 64.23.224.233
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: /root/deploy-bot.sh
